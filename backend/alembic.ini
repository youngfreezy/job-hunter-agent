# Alembic configuration for JobHunter Agent

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# DB URL loaded from environment in env.py — this is a fallback only
sqlalchemy.url = postgresql+psycopg://jobhunter:jobhunter_dev@localhost:5433/jobhunter

[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
