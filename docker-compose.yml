version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobhunter_db
    environment:
      POSTGRES_USER: jobhunter
      POSTGRES_PASSWORD: jobhunter
      POSTGRES_DB: jobhunter
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobhunter -d jobhunter"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobhunter_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: jobhunter_umami
    environment:
      DATABASE_URL: postgresql://jobhunter:jobhunter@postgres:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: umami-secret-change-me
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    init: true

volumes:
  pgdata:
