version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobhunter_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobhunter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobhunter_dev}
      POSTGRES_DB: ${POSTGRES_DB:-jobhunter}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobhunter} -d ${POSTGRES_DB:-jobhunter}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobhunter_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-jobhunter_redis_dev}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-jobhunter_redis_dev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: jobhunter_umami
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobhunter}:${POSTGRES_PASSWORD:-jobhunter_dev}@postgres:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-umami-dev-secret}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    init: true

  skyvern:
    image: public.ecr.aws/skyvern/skyvern:latest
    container_name: jobhunter_skyvern
    restart: on-failure
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENABLE_ANTHROPIC: "true"
      LLM_KEY: ANTHROPIC
      SKYVERN_TELEMETRY: "false"
      BROWSER_TYPE: chromium-headful
      DATABASE_STRING: postgresql+psycopg://${POSTGRES_USER:-jobhunter}:${POSTGRES_PASSWORD:-jobhunter_dev}@postgres:5432/skyvern
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
